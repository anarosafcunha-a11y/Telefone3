<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telefone Profissional</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}.phone { width: 300px; background: #111827; border-radius: 20px; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

.screen { background: #000; padding: 15px; border-radius: 10px; text-align: right; font-size: 24px; margin-bottom: 15px; }

.buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

button { padding: 15px; font-size: 18px; border: none; border-radius: 10px; background: #334155; color: white; cursor: pointer; }

button:hover { background: #475569; }

.call { grid-column: span 3; background: green; }

.call:hover { background: darkgreen; }

.footer { text-align: center; margin-top: 10px; font-size: 12px; color: #94a3b8; } </style>

</head>
<body><div class="phone">
    <div id="display" class="screen">0</div><div class="buttons">
    <button onclick="addNumber('1')">1</button>
    <button onclick="addNumber('2')">2</button>
    <button onclick="addNumber('3')">3</button>
    <button onclick="addNumber('4')">4</button>
    <button onclick="addNumber('5')">5</button>
    <button onclick="addNumber('6')">6</button>
    <button onclick="addNumber('7')">7</button>
    <button onclick="addNumber('8')">8</button>
    <button onclick="addNumber('9')">9</button>
    <button onclick="clearDisplay()">C</button>
    <button onclick="addNumber('0')">0</button>
    <button onclick="backspace()">⌫</button>
    <button class="call" onclick="call()">📞 Ligar</button>
</div>

<div class="footer">App Telefone Profissional</div>

</div><script>
let display = document.getElementById("display");

function addNumber(num) {
    if (display.innerText === "0") {
        display.innerText = num;
    } else {
        display.innerText += num;
    }
}

function clearDisplay() {
    display.innerText = "0";
}

function backspace() {
    display.innerText = display.innerText.slice(0, -1) || "0";
}

function call() {
    alert("Ligando para: " + display.innerText);
}
</script></body>
</html>
